services:
  - type: web
    name: collegebase
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd collegebase-frontend && npm install && npm run build && cd ..
      python migrate.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
